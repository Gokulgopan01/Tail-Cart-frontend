<nav class="luxury-navbar" [class.scrolled]="isScrolled" [class.hidden]="isPastHalfScreen" [class.nav-hidden]="isScrollingDown" *ngIf="!hideTopNav">
  <div class="nav-floating-body">
    <div class="nav-container container">
      <!-- Left: Menu Toggle -->
      <button class="mobile-menu-toggle" (click)="toggleMobileMenu()" aria-label="Open Menu">
        <div class="hamburger-icon" [class.open]="isMobileMenuOpen">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <span class="menu-text">MENU</span>
      </button>

      <!-- Center: Brand Logo -->
      <div class="nav-logo" (click)="navigateToHome()">
        <span class="brand-text-desktop">TailCart</span>
      </div>

      <!-- Right: Icons -->
      <div class="nav-icons">
        <!-- Notification -->
        <button class="nav-icon notification-btn" title="Notifications">
          <i class="fas fa-bell"></i>
          <span class="badge pulse-red"></span>
        </button>

        <!-- Cart -->
        <a class="nav-icon cart-link" routerLink="/cart" title="Cart">
          <div class="cart-wrapper">
            <i class="fas fa-shopping-bag"></i>
            <span class="cart-count">3</span>
          </div>
        </a>

        <!-- Profile Thumb (Desktop) -->

      </div>
    </div>
  </div>

  <!-- MOBILE SIDEBAR MENU -->
  <div class="sidebar-overlay" [class.active]="isMobileMenuOpen" (click)="closeMobileMenu()"></div>
  <aside class="mobile-sidebar" [class.active]="isMobileMenuOpen">
    <div class="sidebar-header-premium">
      <span class="menu-title-top">Menu</span>
      <button class="sidebar-close-luxury" (click)="closeMobileMenu()">
        <i class="fas fa-times"></i>
      </button>
    </div>

    <div class="sidebar-scroll-content">
      <div class="menu-items-group">
        <a class="menu-item-premium" routerLink="/home" (click)="closeMobileMenu()" routerLinkActive="active">
          <div class="item-icon"><i class="fas fa-home"></i></div>
          <span class="item-label">Home</span>
        </a>
        <a class="menu-item-premium" routerLink="/shop" (click)="closeMobileMenu()" routerLinkActive="active">
          <div class="item-icon"><i class="fas fa-shopping-bag"></i></div>
          <span class="item-label">Shop</span>
        </a>
        <a class="menu-item-premium" routerLink="/document" (click)="closeMobileMenu()" routerLinkActive="active">
          <div class="item-icon"><i class="fas fa-folder"></i></div>
          <span class="item-label">Documents / Reminders</span>
        </a>
        <!-- <a class="menu-item-premium" routerLink="/alerts" (click)="closeMobileMenu()" routerLinkActive="active">
          <div class="item-icon"><i class="fas fa-bell"></i></div>
          <span class="item-label">Alerts</span>
        </a> -->
        <a class="menu-item-premium" routerLink="/doctor-ai" (click)="closeMobileMenu()" routerLinkActive="active">
          <div class="item-icon"><i class="fas fa-stethoscope"></i></div>
          <span class="item-label">API Doctor</span>
        </a>
        <!-- <a class="menu-item-premium" routerLink="/profile-public" (click)="closeMobileMenu()" routerLinkActive="active">
          <div class="item-icon"><i class="fas fa-users"></i></div>
          <span class="item-label">Public Profile</span>
        </a> -->
        <a class="menu-item-premium" routerLink="/profile" (click)="closeMobileMenu()" routerLinkActive="active">
          <div class="item-icon"><i class="fas fa-user"></i></div>
          <span class="item-label">Owner Profile</span>
        </a>
        <a class="menu-item-premium" routerLink="/cart" (click)="closeMobileMenu()" routerLinkActive="active">
          <div class="item-icon"><i class="fas fa-shopping-bag"></i></div>
          <span class="item-label">Cart</span>
        </a>
        <a class="menu-item-premium" routerLink="/about" (click)="closeMobileMenu()" routerLinkActive="active">
          <div class="item-icon"><i class="fas fa-info-circle"></i></div>
          <span class="item-label">About</span>
        </a>
      </div>

      <div class="menu-footer-luxury">
        <button class="menu-item-premium logout-item" (click)="logout()">
          <div class="item-icon"><i class="fas fa-sign-out-alt"></i></div>
          <span class="item-label">Logout</span>
        </button>
      </div>
    </div>
  </aside>

</nav>
