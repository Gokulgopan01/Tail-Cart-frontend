<div class="shop-page">

  <!-- ============ HERO ============ -->
  <header class="shop-hero">
    <img src="/assets/products/catdog_friends-HomeCover.png" alt="Dog and cat sitting together at home"
      class="shop-hero__bg">
    <div class="shop-hero__scrim"></div>

    <div class="shop-hero__nav">
      <button class="icon-btn" routerLink="/home" aria-label="Back">
        <i class="fas fa-chevron-left"></i>
      </button>
      <button class="icon-btn" routerLink="/cart" aria-label="Cart">
        <i class="fas fa-shopping-cart"></i>
        <span class="badge-dot" *ngIf="cartCount > 0">{{ cartCount }}</span>
      </button>
    </div>

    <div class="shop-hero__text">
      <span class="eyebrow">Everything for your pets</span>
      <h1>All in one happy place <span class="eyebrow-paw">🐾</span></h1>
      <p>Premium products for pets, picked with love and care.</p>
    </div>

    <!-- ============ SEARCH + TOOLBAR (overlapping card) ============ -->
    <div class="shop-toolbar">
      <div class="shop-toolbar__row">
        <div class="search-field">
          <i class="fas fa-search"></i>
          <input type="text" placeholder="Search for products..." [(ngModel)]="searchQuery" (input)="applyFilters()">
          <button class="search-clear" *ngIf="searchQuery" (click)="searchQuery=''; applyFilters()"
            aria-label="Clear search">
            <i class="fas fa-times"></i>
          </button>
        </div>

        <!-- Desktop inline controls -->
        <div class="toolbar-inline only-desktop">
          <div class="select-pill">
            <select [(ngModel)]="categoryFilter" (change)="applyFilters()">
              <option value="all">All Categories</option>
              <option *ngFor="let cat of categories" [value]="cat.id">{{ cat.label }}</option>
            </select>
            <i class="fas fa-chevron-down"></i>
          </div>
          <div class="select-pill select-pill--dark">
            <select [(ngModel)]="sortOption" (change)="applyFilters()">
              <option value="newest">Newest</option>
              <option value="priceLow">Price: Low to High</option>
              <option value="priceHigh">Price: High to Low</option>
              <option value="name">Name: A-Z</option>
            </select>
            <i class="fas fa-chevron-down"></i>
          </div>
        </div>

        <!-- Mobile filter trigger -->
        <button class="filter-trigger only-mobile" (click)="toggleFilters()">
          <i class="fas fa-sliders-h"></i>
          <span>Filters</span>
          <span class="filter-trigger__count" *ngIf="activeFilterCount > 0">{{ activeFilterCount }}</span>
        </button>
      </div>

      <!-- Category avatars -->
      <div class="category-row">
        <button *ngFor="let cat of categories" class="category-card" [class.active]="cat.id === activeCategory"
          (click)="selectCategory(cat.id)">
          <span class="category-card__avatar">
            <img [src]="cat.image" [alt]="cat.label">
          </span>
          <span class="category-card__label">{{ cat.label }}</span>
          <span class="category-card__count">{{ cat.count }}+ items</span>
        </button>
      </div>
    </div>
  </header>

  <div class="shop-toolbar-spacer"></div>

</div>
