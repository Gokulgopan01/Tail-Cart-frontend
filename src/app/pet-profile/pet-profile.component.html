<div class="pet-profile-page" *ngIf="!isLoading && pet" @fadeUp>
  <!-- 1. Navigation Pill Bar -->
  <nav class="nav-pill-wrapper">
    <div class="nav-pill-container">
      <button class="nav-pill-btn" routerLink="/profile">
        <span>My<br>Profile</span>
      </button>
      <button class="nav-pill-btn active">
        <span>Pet<br>Profile</span>
      </button>
      <button class="nav-pill-btn" [routerLink]="['/pet-public']" [queryParams]="{user_id: userId, pet_id: pet.pet_id}">
        <span>Public<br>Profile</span>
      </button>
    </div>
  </nav>

  <main class="pet-content-scroll">
    <!-- 2. Hero Image Section -->
    <div class="pet-hero-container">
      <div class="photo-card">
        <div class="status-pill top-left" [class.lost]="pet.is_lost">
          <span class="dot"></span>
          {{ pet.is_lost ? 'REPORTED LOST' : 'SAFE' }}
        </div>
        <img [src]="getPetPhoto()" [alt]="pet.pet_name" class="hero-pet-image">
      </div>
    </div>

    <!-- 3. Identity Section -->
    <section class="identity-section-modern">
      <h1 class="pet-main-name">{{ pet.pet_name }}</h1>
      <div class="verified-companion">
        <i class="fas fa-certificate verified-icon"></i> Verified Companion
      </div>

      <div class="identity-pills">
        <div class="info-pill">
          <i class="fas fa-paw"></i> {{ pet.breed || pet.species }}
        </div>
        <div class="info-pill">
          <i class="far fa-calendar-alt"></i> {{ pet.age }} Year{{ pet.age !== 1 ? 's' : '' }} Old
        </div>
        <div class="info-pill">
          <i class="fas fa-mars"></i> {{ pet.gender }}
        </div>
      </div>
    </section>

    <!-- 4. Owner Management Actions -->
    <section class="management-actions">
      <h3 class="section-title">MANAGEMENT</h3>
      <div class="action-grid">
        <button class="action-card" (click)="toggleLostStatus()" [class.warning]="!pet.is_lost">
          <i class="fas" [ngClass]="pet.is_lost ? 'fa-home' : 'fa-bullhorn'"></i>
          <span>{{ pet.is_lost ? 'Mark as Safe' : 'Report Lost' }}</span>
        </button>
        <button class="action-card" (click)="editPet()">
          <i class="fas fa-pen"></i>
          <span>Edit Details</span>
        </button>
        <button class="action-card danger" (click)="deletePet()">
          <i class="fas fa-trash-alt"></i>
          <span>Remove Pet</span>
        </button>
      </div>
    </section>

    <!-- 5. About Me Section -->
    <section class="bio-section white-card">
      <h2 class="section-heading">About Me</h2>
      <p class="bio-text">
        {{ pet.about || pet.pet_name }}
      </p>
    </section>
  </main>
</div>

<!-- Loading State -->
<div class="loading-state" *ngIf="isLoading">
  <div class="spinner"></div>
  <p>Loading {{ pet?.pet_name || 'Companion' }} Profile...</p>
</div>
